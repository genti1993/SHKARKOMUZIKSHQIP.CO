<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://w3.org">
<html xmlns="http://w3.org" lang="sq" xml:lang="sq">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Shkarko Muzik Shqip mp3 falas</title>
    
    <!-- Lidhja e 4 skedarëve të stilit (CSS) -->
    <link rel="stylesheet" type="text/css" href="icon.css" media="screen" />
    <link rel="stylesheet" type="text/css" href="props.css" media="screen" />
    <link rel="stylesheet" type="text/css" href="scroll.css" media="screen" />
    <link rel="stylesheet" type="text/css" href="core.css" media="screen" />
</head>
<body class="scrollbars size14 fontn color333 featured">

    <!-- Sidebar / Menuja Anësore -->
    <div class="sidebar fixed scrolls">	
        <a href="#" class="logo rel noul bl">
            <h2>Muzik Shqip</h2>
        </a>
        <ul class="nav size16 fontl">
            <li class="rel"><a href="#" class="bl noul active" id="nav-home"><i class="fa-solid fa-house icn"></i> Ballina</a></li>
            <li class="rel"><a href="#" class="bl noul" id="nav-search"><i class="fa-solid fa-magnifying-glass icn"></i> Kërko</a></li>
            <li class="rel"><a href="#" class="bl noul" id="nav-info"><i class="fa-solid fa-circle-info"></i> Informata</a></li>
            <li class="rel"><a href="#" class="bl noul" id="nav-contact"><i class="fa-solid fa-envelope"></i> Na kontaktoni</a></li>
        </ul>
    </div>

    <!-- Përmbajtja Qendrore -->
    <div class="main-content fixed gbox gbox-featured scrolls">
        <div class="top-tabs htabs size15 fontb">
            <button class="tab active" data-tab="featured">Hitet</button>
            <button class="tab" data-tab="new">Këngët të Reja</button>
            <button class="tab" data-tab="albums">Albume</button>
        </div>

        <div class="dataBox rel">
            <div class="featured-section">
                <h2 class="size30 fontb cfff areaTitle">Top Hitet - Shkarkuara</h2>
                
                <!-- Kontenitori ku skripti do të hedhë këngët automatikisht -->
                <div class="tracks-container" id="tracksContainer"></div>
            </div>
        </div>
    </div>

    <!-- Audio Player Bar -->
    <div class="audio-player-bar" id="playerBar">
        <div class="player-info">
            <i class="fa-solid fa-music music-wave" id="musicWave"></i>
            <span id="currentTrackTitle">Asnjë këngë...</span>
        </div>
        <div class="player-controls">
            <button id="btn-backward" type="button"><i class="fa-solid fa-backward-step"></i></button>
            <button id="btn-main-play" type="button"><i class="fa-solid fa-circle-play"></i></button>
            <button id="btn-forward" type="button"><i class="fa-solid fa-forward-step"></i></button>
        </div>
        <div class="player-volume">
            <i class="fa-solid fa-volume-high"></i>
            <input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="1" />
        </div>
    </div>

    <!-- Lidhja e 2 skedarëve të logjikës (JS) -->
    <script type="text/javascript" src="script.js"></script>
    <script type="text/javascript" src="ui.js"></script>
</body>
</html>
