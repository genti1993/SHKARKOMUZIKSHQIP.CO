<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://w3.org">
<html xmlns="http://w3.org" lang="sq" xml:lang="sq">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shkarko Muzik Shqip mp3 falas</title>
    <link rel="stylesheet" type="text/css" href="style.css" media="screen" />
    <link rel="stylesheet" href="https://cloudflare.com" />
</head>
<body class="featured-page">

    <!-- Menuja Anësore (Sidebar UI) -->
    <div class="sidebar">	
        <div class="logo-container">
            <h2>Muzik Shqip</h2>
        </div>
        
        <!-- Shiriti i Kërkimit UI -->
        <div class="search-box-container">
            <i class="fa-solid fa-magnifying-glass search-icon"></i>
            <input type="text" id="searchInput" placeholder="Kërko artist ose këngë..." />
        </div>

        <ul class="nav-links">
            <li><a href="#" class="nav-item active" data-target="home"><i class="fa-solid fa-house"></i> Ballina</a></li>
            <li><a href="#" class="nav-item" data-target="favorites"><i class="fa-solid fa-heart"></i> Të Preferuarat</a></li>
            <li><a href="#" class="nav-item" data-target="info"><i class="fa-solid fa-circle-info"></i> Informata</a></li>
        </ul>
    </div>

    <!-- Përmbajtja Qendrore -->
    <div class="main-content">
        <!-- Tabet e Lundrimit UI -->
        <div class="top-tabs" id="tabMenu">
            <button class="tab active" data-category="all">Të Gjitha</button>
            <button class="tab" data-category="hitet">Top Hitet</button>
            <button class="tab" data-category="new">Këngët të Reja</button>
        </div>

        <!-- Seksioni Dinamik i Këngëve -->
        <div class="featured-section" id="mainSection">
            <h2 class="section-title" id="sectionTitle">Top Hitet - Më të Shkarkuara</h2>
            <div class="tracks-container" id="tracksContainer"></div>
        </div>
    </div>

    <!-- Audio Player UI Component -->
    <div class="audio-player-bar" id="playerBar">
        <div class="player-info">
            <!-- Equalizer Animacion -->
            <div class="wave-visualizer" id="waveVisualizer">
                <span></span><span></span><span></span><span></span>
            </div>
            <div class="player-text-details">
                <span id="currentTrackTitle">Asnjë këngë...</span>
                <span id="currentTrackArtist" class="sub-text">Zgjidhni një këngë</span>
            </div>
        </div>
        <div class="player-controls">
            <button id="btn-backward" type="button"><i class="fa-solid fa-backward-step"></i></button>
            <button id="btn-main-play" type="button"><i class="fa-solid fa-circle-play"></i></button>
            <button id="btn-forward" type="button"><i class="fa-solid fa-forward-step"></i></button>
        </div>
        <div class="player-volume">
            <i class="fa-solid fa-volume-high" id="volumeIcon"></i>
            <input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="1" />
        </div>
    </div>

    <!-- Kontenitori për Njoftimet UI (Toast) -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Lidhja e dy skripteve sipas radhës së saktë -->
    <script type="text/javascript" src="script.js"></script>
    <script type="text/javascript" src="ui.js"></script>
</body>
</html>
